name: Parent Workflow

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - 'docs/**'
    tags-ignore:
      - v*
  pull_request:
    branches: [ master, main ]
    paths-ignore:
      - 'docs/**'
    tags-ignore:
      - v*
  workflow_dispatch:
    # https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#workflow_dispatch
    # To enable a workflow to be triggered manually, you need to configure the workflow_dispatch event

permissions:
  contents: write

jobs:
  linux-sub-workflow:
    uses: ./.github/workflows/sub-workflow-linux.yml

  macos-sub-workflow:
    uses: ./.github/workflows/sub-workflow-macos.yml

  windows-sub-workflow:
    uses: ./.github/workflows/sub-workflow-windows.yml

  # Consolidate job - downloads artifacts from each sub-workflow's run
  consolidate-buildFlags:
    needs: [linux-sub-workflow, macos-sub-workflow, windows-sub-workflow]
    if: always() # Forces execution regardless of sub-workflow success/failure statuses

    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial for pushing changes back to github remote repository


    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetches full history so git can switch and track branches safely

      - name: Create Work-Around-Flags Directory
        run: |
          FLAG_DIR="${{github.workspace}}/build-debug/workAroundFlags"
          mkdir -p ${FLAG_DIR}

      # Download artifacts from Linux sub-workflow run
      - name: Download Linux Sub-Workflow Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifact-*
          path: build-debug/workAroundFlags/
          merge-multiple: true
          run-id: ${{ needs.linux-sub-workflow.outputs.run-id }}
        continue-on-error: true

      # Download artifacts from macOS sub-workflow run
      - name: Download macOS Sub-Workflow Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifact-*
          path: build-debug/workAroundFlags/
          merge-multiple: true
          run-id: ${{ needs.macos-sub-workflow.outputs.run-id }}
        continue-on-error: true

      # Download artifacts from Windows sub-workflow run
      - name: Download Windows Sub-Workflow Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifact-*
          path: build-debug/workAroundFlags/
          merge-multiple: true
          run-id: ${{ needs.windows-sub-workflow.outputs.run-id }}
        continue-on-error: true

      - name: List Downloaded Artifacts
        run: |
          echo "Artifacts downloaded: "$(ls -l "${{github.workspace}}/build-debug/workAroundFlags/" | wc -l)
          ls -R "${{github.workspace}}/build-debug/workAroundFlags/" || echo "No artifacts found"

      - name: Consolidate Artifacts and Merge
        run: |
          # Enable nullglob so an unmatched glob expands to nothing instead of the literal pattern
          shopt -s nullglob
          files=("${{github.workspace}}/build-debug/workAroundFlags/flag-"*.csv)
          if [ ${#files[@]} -gt 0 ]; then
            sort -u "${files[@]}" > "${{github.workspace}}/doc/consolidateWorkAroundFlags.csv"
            cat "${{github.workspace}}/doc/consolidateWorkAroundFlags.csv"
          else
            echo "No flag-*.csv files found in ${{github.workspace}}/build-debug/workAroundFlags/. Skipping consolidation."
          fi

      - name: GIT Commit and Push Changes
        run: |
          PR_BRANCH="automation/build-flags"
          TARGET_FILE="${{github.workspace}}/doc/consolidateWorkAroundFlags.csv"

          # 1. Configure Git using the standard GitHub Actions bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 2. Safely switch to the PR branch (create it locally if it only exists remotely, or create from scratch)
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/${PR_BRANCH}"; then
            echo "Branch exists on remote. Checking it out..."
            git checkout -b "${PR_BRANCH}" "origin/${PR_BRANCH}"

            # Pull the absolute latest updates from main into this branch to stay current
            echo "Syncing PR branch with latest changes from main..."
            git merge origin/main --no-edit
          else
            echo "Branch does not exist. Creating a new one from main..."
            git checkout -b "${PR_BRANCH}"
          fi

          git add ${TARGET_FILE}

          # Only commit and push if there are actual changes to prevent workflow errors
          if ! git diff --cached --quiet; then
            git commit -m "chore: automatically update consolidateWorkAroundFlags.csv [skip ci]"
            git push origin "${PR_BRANCH}"
          else
            echo "No changes detected. Skipping commit."
          fi
